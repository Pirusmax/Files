name: Org/Shop Scoping Audit
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  audit-org-shop-scoping:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm install -g typescript @typescript-eslint/parser
      
      - name: Run Org/Shop Scoping Audit
        id: audit
        run: node scripts/audit-org-shop-scoping.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
      
      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditResults = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
            
            const comment = `## 🔍 Org/Shop Scoping Audit Results
            
            **Audit Date**: ${new Date().toISOString()}
            **Commit**: ${context.sha.substring(0, 7)}
            **Status**: ${auditResults.passed ? '✅ PASSED' : '❌ FAILED'}
            **Score**: ${auditResults.score}/${auditResults.totalChecks}
            
            ### Summary
            - **Files Scanned**: ${auditResults.filesScanned}
            - **Critical Issues**: ${auditResults.criticalIssues}
            - **Warnings**: ${auditResults.warnings}
            - **Recommendations**: ${auditResults.recommendations}
            
            ${auditResults.details}
            
            ---
            <details>
            <summary>🛠️ Detailed Findings</summary>
            
            ${auditResults.detailedReport}
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Fail if critical issues found
        if: steps.audit.outputs.critical_issues > 0
        run: |
          echo "❌ Critical org/shop scoping issues found!"
          exit 1
